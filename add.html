<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>إضافة / تعديل منشور | مدونة محمد شعبان</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>

<style>
:root {
  --bg: #05031a;
  --card: #0f0726;
  --accent: #00ffff;
  --text: #fff;
}
body.light {
  --bg: #f6f6f6;
  --card: #ffffff;
  --accent: #0077ff;
  --text: #000;
}
body {
  font-family: 'Cairo', sans-serif;
  background: var(--bg);
  color: var(--text);
  direction: rtl;
  text-align: center;
  margin: 0;
  padding: 20px;
  transition: background 0.4s, color 0.4s;
}
h1 { color: var(--accent); margin-bottom: 20px; }

input, textarea {
  width: 90%;
  max-width: 700px;
  background: var(--card);
  color: var(--text);
  border: 1px solid #333;
  border-radius: 10px;
  padding: 10px;
  margin-bottom: 15px;
}

textarea { height: 180px; resize: vertical; }

button {
  background: var(--accent);
  color: #000;
  border: none;
  padding: 12px 25px;
  border-radius: 20px;
  font-weight: 700;
  cursor: pointer;
  margin: 5px;
}

button:hover { opacity: 0.85; }

a {
  color: var(--accent);
  display: block;
  margin-top: 20px;
  text-decoration: none;
}

#mode-toggle {
  position: fixed;
  top: 15px;
  left: 15px;
  background: var(--accent);
  color: var(--bg);
  border: none;
  border-radius: 50%;
  width: 45px;
  height: 45px;
  font-size: 18px;
  cursor: pointer;
}

.footer {
  margin-top: 40px;
  padding: 20px 0;
  border-top: 1px solid #222;
}
body.light .footer { border-top: 1px solid #ccc; }

.footer h3 { color: var(--accent); margin-bottom: 15px; }

.social-links a {
  display: inline-block;
  margin: 0 10px;
  font-size: 22px;
  color: var(--accent);
}

.social-links a:hover {
  color: #fff;
}
</style>
</head>

<body>

<button id="mode-toggle"><i class="fas fa-sun"></i></button>

<h1>✍️ إضافة / تعديل منشور</h1>

<input id="title" placeholder="عنوان المنشور">
<br>

<textarea id="content" placeholder="اكتب المحتوى هنا..."></textarea>

<br>

<!-- 🔥 زرار إضافة كود -->
<button type="button" onclick="addCode()">📦 إضافة كود</button>

<br>

<input id="videoUrl" placeholder="رابط الفيديو (اختياري)">
<br>

<button onclick="savePost()">نشر</button>

<a href="manage.html">← الرجوع لإدارة المنشورات</a>

<div class="footer">
  <h3>تابعني على مواقع التواصل</h3>
  <div class="social-links">
    <a href="https://wa.me/201094517814" target="_blank"><i class="fab fa-whatsapp"></i></a>
    <a href="https://t.me/pablo_0boy" target="_blank"><i class="fab fa-telegram"></i></a>
    <a href="https://www.facebook.com/share/1DLp9ydAKB/" target="_blank"><i class="fab fa-facebook"></i></a>
    <a href="https://youtube.com/@mohamedshaban-y4c" target="_blank"><i class="fab fa-youtube"></i></a>
    <a href="https://www.linkedin.com/in/m-shaban-67a05035a" target="_blank"><i class="fab fa-linkedin"></i></a>
  </div>
  <p style="color:#888; font-size:13px;">© 2025 جميع الحقوق محفوظة - محمد شعبان</p>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
// Firebase
const firebaseConfig = {
  apiKey: "AIzaSyBVgZsBL9fjSVqiZFad6VoRGMydYikDciI",
  authDomain: "mohamed-shaban-ab814.firebaseapp.com",
  projectId: "mohamed-shaban-ab814",
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// 🔥 إضافة كود تلقائي
function addCode() {
  const textarea = document.getElementById("content");
  const template = "\n```code\nاكتب الكود هنا\n```\n";

  const start = textarea.selectionStart;
  const end = textarea.selectionEnd;

  textarea.value =
    textarea.value.substring(0, start) +
    template +
    textarea.value.substring(end);

  textarea.focus();
}

// تعديل أو إضافة
const params = new URLSearchParams(window.location.search);
const postId = params.get("id");

if(postId){
  db.collection("posts").doc(postId).get().then(doc=>{
    if(doc.exists){
      const post = doc.data();
      title.value = post.title;
      content.value = post.content;
      videoUrl.value = post.videoUrl || "";
    }
  });
}

function savePost(){
  const title = title.value.trim();
  const content = content.value.trim();
  const videoUrl = videoUrl.value.trim();

  if(!title || !content){
    alert("❗ اكتب العنوان والمحتوى");
    return;
  }

  if(postId){
    db.collection("posts").doc(postId).update({ title, content, videoUrl })
      .then(()=> alert("✅ تم التحديث"));
  } else {
    db.collection("posts").add({
      title,
      content,
      videoUrl,
      date: new Date().toLocaleString()
    }).then(()=> alert("✅ تم النشر"));
  }
}

// Dark Mode
const toggleBtn = document.getElementById("mode-toggle");
const mode = localStorage.getItem("mode") || "dark";

if(mode === "light"){
  document.body.classList.add("light");
}

toggleBtn.onclick = () => {
  document.body.classList.toggle("light");
  localStorage.setItem("mode",
    document.body.classList.contains("light") ? "light" : "dark"
  );
};
</script>

</body>
</html>
