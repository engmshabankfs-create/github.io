<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>إضافة / تعديل منشور | مدونة محمد شعبان</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
<style>
:root {
  --bg: #05031a;
  --card: #0f0726;
  --accent: #00ffff;
  --text: #fff;
}
body.light {
  --bg: #f6f6f6;
  --card: #ffffff;
  --accent: #0077ff;
  --text: #000;
}
body {
  font-family: 'Cairo', sans-serif;
  background: var(--bg);
  color: var(--text);
  direction: rtl;
  text-align: center;
  margin: 0;
  padding: 20px;
  transition: background 0.4s, color 0.4s;
}
h1 { color: var(--accent); margin-bottom: 20px; }
input, textarea { width: 90%; max-width: 700px; background: var(--card); color: var(--text); border: 1px solid #333; border-radius: 10px; padding: 10px; margin-bottom: 15px; transition: background 0.4s, color 0.4s; }
textarea { height: 180px; resize: vertical; }
button { background: var(--accent); color: #000; border: none; padding: 12px 30px; border-radius: 25px; font-weight: 700; cursor: pointer; transition: 0.3s; }
button:hover { opacity: 0.85; }
a { color: var(--accent); display: block; margin-top: 20px; text-decoration: none; }
#mode-toggle { position: fixed; top: 15px; left: 15px; background: var(--accent); color: var(--bg); border: none; border-radius: 50%; width: 45px; height: 45px; font-size: 18px; cursor: pointer; transition: 0.3s; }
#mode-toggle:hover { transform: rotate(20deg) scale(1.1); }
.footer { margin-top: 40px; padding: 20px 0; border-top: 1px solid #222; }
body.light .footer { border-top: 1px solid #ccc; }
.footer h3 { color: var(--accent); margin-bottom: 15px; }
.social-links a { display: inline-block; margin: 0 10px; font-size: 22px; color: var(--accent); transition: 0.3s; }
.social-links a:hover { color: #fff; transform: scale(1.15); }
body.light .social-links a:hover { color: #000; }
</style>
</head>
<body>

<!-- زر الوضع النهاري/الليلي -->
<button id="mode-toggle"><i class="fas fa-sun"></i></button>

<h1>✍️ إضافة / تعديل منشور</h1>
<input id="title" placeholder="عنوان المنشور">
<br>
<textarea id="content" placeholder="اكتب المحتوى هنا..."></textarea>
<br>
<input id="videoUrl" placeholder="رابط الفيديو (اختياري)">
<br>
<button onclick="savePost()">نشر</button>
<a href="manage.html">← الرجوع لإدارة المنشورات</a>

<div class="footer">
  <h3>تابعني على مواقع التواصل</h3>
  <div class="social-links">
    <a href="https://wa.me/201094517814" target="_blank" title="واتساب"><i class="fab fa-whatsapp"></i></a>
    <a href="https://t.me/pablo_0boy" target="_blank" title="تيليجرام"><i class="fab fa-telegram"></i></a>
    <a href="https://www.facebook.com/share/1DLp9ydAKB/" target="_blank" title="فيسبوك"><i class="fab fa-facebook"></i></a>
    <a href="https://youtube.com/@mohamedshaban-y4c?si=P7vz5qJi5aQJMn5B" target="_blank" title="قناة يوتيوب"><i class="fab fa-youtube"></i></a>
    <a href="https://www.linkedin.com/in/m-shaban-67a05035a" target="_blank" title="لينكدإن"><i class="fab fa-linkedin"></i></a>
  </div>
  <p style="color:#888; font-size:13px; margin-top:15px;">© 2025 جميع الحقوق محفوظة - محمد شعبان</p>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
// إعدادات Firebase
const firebaseConfig = {
  apiKey: "AIzaSyBVgZsBL9fjSVqiZFad6VoRGMydYikDciI",
  authDomain: "mohamed-shaban-ab814.firebaseapp.com",
  projectId: "mohamed-shaban-ab814",
  storageBucket: "mohamed-shaban-ab814.firebasestorage.app",
  messagingSenderId: "651988656935",
  appId: "1:651988656935:web:849262e31bf90a72bf3f02",
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// التحقق من id في الرابط لمعرفة إذا تعديل
const params = new URLSearchParams(window.location.search);
const postId = params.get("id");

if(postId){
  db.collection("posts").doc(postId).get().then(doc=>{
    if(doc.exists){
      const post = doc.data();
      document.getElementById("title").value = post.title;
      document.getElementById("content").value = post.content;
      document.getElementById("videoUrl").value = post.videoUrl || "";
      document.querySelector("button").textContent = "تحديث المنشور";
    }
  });
}

function savePost(){
  const title = document.getElementById("title").value.trim();
  const content = document.getElementById("content").value.trim();
  const videoUrl = document.getElementById("videoUrl").value.trim();

  if(!title || !content){
    alert("❗ اكتب العنوان والمحتوى أولاً");
    return;
  }

  if(postId){
    // تحديث المنشور
    db.collection("posts").doc(postId).update({ title, content, videoUrl })
      .then(()=> { alert("✅ تم تحديث المنشور"); window.location="manage.html"; })
      .catch(err=> alert("❌ خطأ: "+err));
  } else {
    // إضافة منشور جديد
    db.collection("posts").add({ title, content, videoUrl, date:new Date().toLocaleString() })
      .then(()=> { alert("✅ تم نشر المنشور بنجاح"); window.location="index.html"; })
      .catch(err=> alert("❌ حدث خطأ: "+err));
  }
}

// تبديل الوضع
const toggleBtn = document.getElementById("mode-toggle");
const currentMode = localStorage.getItem("mode") || "dark";
if(currentMode === "light"){
  document.body.classList.add("light");
  toggleBtn.innerHTML = '<i class="fas fa-moon"></i>';
}
toggleBtn.addEventListener("click", () => {
  document.body.classList.toggle("light");
  const isLight = document.body.classList.contains("light");
  toggleBtn.innerHTML = isLight ? '<i class="fas fa-moon"></i>' : '<i class="fas fa-sun"></i>';
  localStorage.setItem("mode", isLight ? "light" : "dark");
});
</script>

</body>
</html>
