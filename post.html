<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>عرض المنشور | Eng Mohamed Shaban</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
<style>
:root {
  --bg: #05031a;
  --card: #0f0726;
  --accent: #00ffff;
  --text: #fff;
}
body.light {
  --bg: #f6f6f6;
  --card: #ffffff;
  --accent: #0077ff;
  --text: #000;
}
body {
  font-family: 'Cairo', sans-serif;
  background: var(--bg);
  color: var(--text);
  direction: rtl;
  text-align: center;
  margin: 0;
  padding: 20px;
  transition: background 0.4s, color 0.4s;
}
.post { background: var(--card); padding: 20px; border-radius: 12px; max-width: 700px; margin: auto; text-align: right; box-shadow: 0 0 8px rgba(0,0,0,0.2); }
.post h1 { color: var(--accent); }
.post small { color: #888; }
.post img { max-width: 100%; border-radius: 12px; margin-bottom: 15px; }
.download-link { color: var(--accent); text-decoration: underline; cursor: pointer; }
#mode-toggle { position: fixed; top: 15px; left: 15px; background: var(--accent); color: var(--bg); border: none; border-radius: 50%; width: 45px; height: 45px; font-size: 18px; cursor: pointer; transition: 0.3s; z-index: 1001; }
#mode-toggle:hover { transform: rotate(20deg) scale(1.1); }
</style>
</head>
<body>

<button id="mode-toggle"><i class="fas fa-sun"></i></button>

<div id="post"></div>

<p style="margin-top: 20px;"><a href="index.html">← الرجوع للمدونة</a></p>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
// إعداد Firebase
const firebaseConfig = {
  apiKey: "AIzaSyBVgZsBL9fjSVqiZFad6VoRGMydYikDciI",
  authDomain: "mohamed-shaban-ab814.firebaseapp.com",
  projectId: "mohamed-shaban-ab814",
  storageBucket: "mohamed-shaban-ab814.firebasestorage.app",
  messagingSenderId: "651988656935",
  appId: "1:651988656935:web:849262e31bf90a72bf3f02",
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

const params = new URLSearchParams(window.location.search);
const id = params.get("id");
const postContainer = document.getElementById("post");

if (id) {
  db.collection("posts").doc(id).get().then(doc => {
    if (!doc.exists) { postContainer.innerHTML = "<p>❌ المنشور غير موجود.</p>"; return; }

    const post = doc.data();

    // استخراج رابط الصورة المصغرة إذا كان هناك رابط فيديو
    let videoThumb = "";
    if(post.videoUrl) {
      const videoIdMatch = post.videoUrl.match(/(?:v=|youtu\.be\/)([a-zA-Z0-9_-]{11})/);
      if(videoIdMatch) videoThumb = `https://img.youtube.com/vi/${videoIdMatch[1]}/hqdefault.jpg`;
    }

    const formattedContent = post.content.replace(
      /(https?:\/\/[^\s]+)/g,
      (match) => `<a href="${match}" target="_blank" class="download-link">لتحميل اضغط هنا</a>`
    );

    postContainer.innerHTML = `
      <div class="post">
        <h1>${post.title}</h1>
        <small>${new Date(post.date).toLocaleString()}</small>
        ${videoThumb ? `<img src="${videoThumb}" alt="صورة الفيديو المصغرة">` : ""}
        <p>${formattedContent}</p>
      </div>
    `;
  }).catch(err => {
    postContainer.innerHTML = "<p>⚠️ حدث خطأ أثناء تحميل المنشور.</p>";
    console.error(err);
  });
} else {
  postContainer.innerHTML = `<div class="post"><h1>⚠️ لا يوجد منشور محدد</h1><p>يرجى الرجوع إلى <a href="index.html" style="color:var(--accent)">الصفحة الرئيسية</a>.</p></div>`;
}

// وضع النهاري/الليلي
const toggleBtn = document.getElementById("mode-toggle");
const currentMode = localStorage.getItem("mode") || "dark";
if (currentMode === "light") { document.body.classList.add("light"); toggleBtn.innerHTML = '<i class="fas fa-moon"></i>'; }
toggleBtn.addEventListener("click", () => {
  document.body.classList.toggle("light");
  const isLight = document.body.classList.contains("light");
  toggleBtn.innerHTML = isLight ? '<i class="fas fa-moon"></i>' : '<i class="fas fa-sun"></i>';
  localStorage.setItem("mode", isLight ? "light" : "dark");
});
</script>

</body>
</html>
